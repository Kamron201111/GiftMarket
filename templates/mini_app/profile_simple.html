{% extends "mini_app/base.html" %}
{% block title %}Profil — NFT Gifts Market{% endblock %}
{% block content %}

<!-- Balans kartasi (screenshotdagi ko'k karta) -->
<div style="background:linear-gradient(135deg,#29b6f6 0%,#0d47a1 100%);border-radius:18px;padding:20px;margin:10px 0;position:relative;overflow:hidden;min-height:140px;">
    <div style="position:absolute;right:-24px;top:-24px;width:120px;height:120px;background:rgba(255,255,255,0.12);border-radius:50%;"></div>
    <div style="position:absolute;right:30px;bottom:-30px;width:90px;height:90px;background:rgba(255,255,255,0.08);border-radius:50%;"></div>
    <!-- Logo -->
    <div style="width:44px;height:44px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:28px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6L12 2z" fill="rgba(255,255,255,0.9)"/>
        </svg>
    </div>
    <div style="color:rgba(255,255,255,0.8);font-size:13px;margin-bottom:4px;">Asosiy balans</div>
    <div style="display:flex;align-items:center;gap:8px;">
        <span style="color:#fff;font-size:32px;font-weight:700;" id="starsBalance">0</span>
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="opacity:.9">
            <polygon points="14,2 17.5,10.5 27,11.5 20,18 22,27 14,22.5 6,27 8,18 1,11.5 10.5,10.5" fill="rgba(255,255,255,0.85)"/>
        </svg>
    </div>
</div>

<!-- Hamyon manzili va tugmalar -->
<div id="walletSection">
    <!-- Ulangan holat -->
    <div id="walletConnected" style="display:none;margin:10px 0;">
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--tg-theme-secondary-bg-color,#f1f1f1);border-radius:10px;padding:12px 14px;margin-bottom:10px;">
            <span style="font-size:15px;font-weight:500;font-family:monospace;" id="walletAddr">UQD...Vo</span>
            <button onclick="disconnectWallet()" style="background:#c0392b;color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer;">
                🔄 Uzish
            </button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <button class="btn" onclick="goDeposit()" style="background:#1a73e8;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 4v16M4 12l8 8 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
                To'ldirish
            </button>
            <button class="btn btn-secondary" onclick="goWithdraw()" style="border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 20V4M4 12l8-8 8 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
                Chiqarish
            </button>
        </div>
    </div>
    <!-- Ulanmagan holat -->
    <div id="walletDisconnected" style="display:none;margin:10px 0;">
        <button class="btn" onclick="connectWallet()" style="background:#1a73e8;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;">
            🔗 Hamyonni ulash
        </button>
    </div>
</div>

<!-- Statistika -->
<div class="card" style="margin-top:10px;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="text-align:center;background:var(--tg-theme-bg-color,#fff);border-radius:10px;padding:14px;">
            <div style="font-size:26px;font-weight:700;color:#1a73e8;" id="dealsCount">0</div>
            <div style="font-size:12px;color:var(--tg-theme-hint-color,#999);margin-top:4px;">Muvaffaqiyatli bitimlar</div>
        </div>
        <div style="text-align:center;background:var(--tg-theme-bg-color,#fff);border-radius:10px;padding:14px;">
            <div style="font-size:26px;" id="verifiedIcon">❌</div>
            <div style="font-size:12px;color:var(--tg-theme-hint-color,#999);margin-top:4px;">Tasdiqlash holati</div>
        </div>
    </div>
</div>

<!-- Amallar -->
<div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <button class="btn" onclick="window.open('https://t.me/+trsTIdq4X8IyOTdi','_blank')" style="background:#0088cc;font-size:13px;padding:11px;">
            📢 Kanal
        </button>
        <button class="btn btn-secondary" onclick="showSupport()" style="font-size:13px;padding:11px;">
            💬 Yordam
        </button>
        <button class="btn" onclick="shareApp()" style="background:#0f9d58;font-size:13px;padding:11px;">
            📤 Ulashish
        </button>
        <button class="btn btn-secondary" onclick="showAbout()" style="font-size:13px;padding:11px;">
            ℹ️ Haqida
        </button>
    </div>
</div>

<div style="text-align:center;padding:10px;color:var(--tg-theme-hint-color,#999);font-size:12px;">
    NFT Gifts Market v3.0 — O'zbekcha
</div>

{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', loadProfile);

function loadProfile() {
    if (!window.telegramUser) {
        document.getElementById('walletDisconnected').style.display = 'block';
        return;
    }
    const u = window.telegramUser;
    const url = `/api/user_profile?telegram_id=${u.id}&username=${encodeURIComponent(u.username||'')}&first_name=${encodeURIComponent(u.first_name||'')}`;
    fetch(url).then(r=>r.json()).then(data => {
        if (!data.success) return;
        const usr = data.user;
        document.getElementById('starsBalance').textContent = usr.balance_stars || 0;
        document.getElementById('dealsCount').textContent   = usr.successful_deals || 0;
        document.getElementById('verifiedIcon').textContent = usr.verified ? '✅' : '❌';

        if (usr.ton_wallet) {
            const w = usr.ton_wallet;
            document.getElementById('walletAddr').textContent = w.slice(0,10)+'...'+w.slice(-6);
            document.getElementById('walletConnected').style.display = 'block';
            document.getElementById('walletDisconnected').style.display = 'none';
        } else {
            document.getElementById('walletConnected').style.display = 'none';
            document.getElementById('walletDisconnected').style.display = 'block';
        }
    }).catch(() => {
        document.getElementById('walletDisconnected').style.display = 'block';
    });
}

function connectWallet() {
    if (window.telegramWebApp) {
        window.telegramWebApp.openTelegramLink('https://t.me/noscamnftrbot?start=wallet');
    }
}
function disconnectWallet() {
    if (window.telegramWebApp) {
        window.telegramWebApp.openTelegramLink('https://t.me/noscamnftrbot?start=wallet_off');
    }
}
function goDeposit() {
    if (window.telegramWebApp) {
        window.telegramWebApp.openTelegramLink('https://t.me/noscamnftrbot?start=dep');
    }
}
function goWithdraw() {
    if (window.telegramWebApp) {
        window.telegramWebApp.openTelegramLink('https://t.me/noscamnftrbot?start=wd');
    }
}
function showSupport() {
    showAlert('💬 Yordam markazi\n\n• Telegram: @noscamnftsup\n• Ish vaqti: 24/7');
}
function showAbout() {
    showAlert('ℹ️ NFT Gifts Market\n\nTelegram NFT sovg\'alarini xavfsiz savdosi.\n\n⭐ Stars to\'ldirish\n💎 TON chiqarish\n🔒 Xavfsiz bitimlar\n\nVersiya: 3.0');
}
function shareApp() {
    const txt = "🎁 NFT Gifts Market — xavfsiz NFT sovg'alar!\n\n✅ Stars to'ldirish\n💎 TON chiqarish\n\nhttps://t.me/noscamnftrbot";
    if (window.telegramWebApp) {
        window.telegramWebApp.openTelegramLink('https://t.me/share/url?url=https://t.me/noscamnftrbot&text='+encodeURIComponent(txt));
    }
}
</script>
{% endblock %}
