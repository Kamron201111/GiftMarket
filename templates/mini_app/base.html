<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{% block title %}NFT Gifts Market{% endblock %}</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            overflow-x: hidden;
        }
        .header { background: var(--tg-theme-secondary-bg-color,#f1f1f1); padding:14px 16px; text-align:center; }
        .header h1 { font-size:18px; font-weight:600; }
        .nav-tabs { display:flex; background:var(--tg-theme-secondary-bg-color,#f1f1f1); border-bottom:1px solid var(--tg-theme-hint-color,#ddd); }
        .nav-tab {
            flex:1; padding:11px 4px; text-align:center; background:none; border:none;
            color:var(--tg-theme-hint-color,#999); font-size:13px; cursor:pointer;
        }
        .nav-tab.active { color:var(--tg-theme-link-color,#2481cc); border-bottom:2px solid var(--tg-theme-link-color,#2481cc); }
        .container { padding:14px; }
        .card { background:var(--tg-theme-secondary-bg-color,#f8f9fa); border-radius:12px; padding:16px; margin:10px 0; border:1px solid rgba(0,0,0,0.08); }
        .btn { background:var(--tg-theme-button-color,#2481cc); color:var(--tg-theme-button-text-color,#fff); border:none; border-radius:10px; padding:13px 20px; font-size:15px; font-weight:500; cursor:pointer; width:100%; margin:6px 0; transition:opacity .2s; }
        .btn:hover { opacity:.85; }
        .btn-secondary { background:var(--tg-theme-secondary-bg-color,#e9ecef); color:var(--tg-theme-text-color,#000); }
        .form-group { margin:14px 0; }
        .form-label { display:block; margin-bottom:6px; font-weight:500; }
        .form-control { width:100%; padding:11px 12px; border:1px solid var(--tg-theme-hint-color,#ced4da); border-radius:8px; font-size:15px; background:var(--tg-theme-bg-color,#fff); color:var(--tg-theme-text-color,#000); }
        .form-control:focus { outline:none; border-color:var(--tg-theme-link-color,#2481cc); }
        .form-select { width:100%; padding:11px 12px; border:1px solid var(--tg-theme-hint-color,#ced4da); border-radius:8px; font-size:15px; background:var(--tg-theme-bg-color,#fff); color:var(--tg-theme-text-color,#000); }
        .status-badge { display:inline-block; padding:3px 8px; border-radius:10px; font-size:12px; font-weight:500; }
        .status-pending { background:#fff3cd; color:#856404; }
        .status-completed { background:#d4edda; color:#155724; }
        .deal-item { border-bottom:1px solid var(--tg-theme-hint-color,#e9ecef); padding:11px 0; }
        .deal-item:last-child { border-bottom:none; }
        .deal-amount { font-size:17px; font-weight:600; color:var(--tg-theme-link-color,#2481cc); }
        .deal-id { font-size:12px; color:var(--tg-theme-hint-color,#999); }
        .alert { padding:11px 12px; border-radius:8px; margin:10px 0; }
        .alert-info { background:#d1ecf1; color:#0c5460; }
        .alert-success { background:#d4edda; color:#155724; }
        .alert-warning { background:#fff3cd; color:#856404; }
        .text-center { text-align:center; }
        .mt-2{margin-top:8px} .mt-3{margin-top:12px} .mb-2{margin-bottom:8px} .mb-3{margin-bottom:12px}
        .hidden { display:none; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header"><h1>🎁 NFT Gifts Market</h1></div>
    <div class="nav-tabs">
        <button class="nav-tab" onclick="navigateTo('/')">🏠 Asosiy</button>
        <button class="nav-tab" onclick="navigateTo('/create')">➕ Yaratish</button>
        <button class="nav-tab" onclick="navigateTo('/deals')">📋 Bitimlar</button>
        <button class="nav-tab" onclick="navigateTo('/profile')">👤 Profil</button>
        <button class="nav-tab" onclick="navigateTo('/admin')" id="adminTab" style="display:none;">🔧 Admin</button>
    </div>
    <div class="container">{% block content %}{% endblock %}</div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        let user = tg.initDataUnsafe?.user;
        let startParam = tg.initDataUnsafe?.start_param;
        if (!startParam) {
            const p = new URLSearchParams(window.location.search);
            startParam = p.get('tgWebAppStartParam') || p.get('startapp');
        }
        if (startParam && startParam.startsWith('deal_')) {
            setTimeout(() => { window.location.href = '/deal/' + startParam.replace('deal_',''); }, 400);
        }
        function navigateTo(p) { window.location.href = p; }
        function updateActiveTab() {
            const tabs = document.querySelectorAll('.nav-tab');
            const path = window.location.pathname;
            tabs.forEach(t => t.classList.remove('active'));
            if (path==='/') tabs[0].classList.add('active');
            else if (path==='/create') tabs[1].classList.add('active');
            else if (path==='/deals') tabs[2].classList.add('active');
            else if (path==='/profile') tabs[3].classList.add('active');
            else if (path==='/admin') tabs[4].classList.add('active');
            if (window.telegramUser) {
                const adminIds = [8566238705];
                if (adminIds.includes(window.telegramUser.id)) {
                    document.getElementById('adminTab').style.display = 'block';
                }
            }
        }
        function showAlert(msg) { tg.showAlert(msg); }
        function confirmAction(msg, cb) { tg.showConfirm(msg, cb); }
        function copyToClipboard(t) {
            navigator.clipboard.writeText(t).then(() => tg.showAlert("Nusxalandi!"));
        }
        document.addEventListener('DOMContentLoaded', updateActiveTab);
        window.telegramUser = user;
        window.telegramWebApp = tg;
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
